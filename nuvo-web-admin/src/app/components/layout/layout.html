<div class="flex h-screen" style="background-color: #0A0E1A;">

    <!-- Sidebar Oscuro -->
    <aside class="w-64 flex flex-col shadow-lg z-10"
        style="background-color: #0A0E1A; border-right: 1px solid rgba(255,255,255,0.1);">

        <!-- Logo Header -->
        <div class="h-16 flex items-center px-6" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
            <div class="w-8 h-8 rounded-lg mr-3 flex items-center justify-center" style="background-color: #00E676;">
                <span class="text-black font-bold text-sm">N</span>
            </div>
            <span class="text-xl font-bold text-white tracking-wide">NUVO ADMIN</span>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 py-6 space-y-2">

            <a routerLink="/dashboard" routerLinkActive="bg-white/10 !text-white font-semibold"
                class="flex items-center px-4 py-3 text-gray-400 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white group cursor-pointer">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span>Dashboard</span>
            </a>

            <a routerLink="/accounts" routerLinkActive="bg-white/10 !text-white font-semibold"
                class="flex items-center px-4 py-3 text-gray-400 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white cursor-pointer">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span>Cuentas</span>
            </a>

            <a routerLink="/loans" routerLinkActive="bg-white/10 !text-white font-semibold"
                class="flex items-center px-4 py-3 text-gray-400 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white cursor-pointer">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>Préstamos</span>
            </a>

            <a routerLink="/pool/manage" routerLinkActive="bg-white/10 !text-white font-semibold"
                class="flex items-center px-4 py-3 text-gray-400 rounded-xl transition-all duration-200 hover:bg-white/5 hover:text-white cursor-pointer">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span>Gestionar Pools</span>
            </a>

        </nav>

        <!-- User Section & Logout -->
        <div class="p-4" style="border-top: 1px solid rgba(255,255,255,0.1);">
            <div class="flex items-center px-4 py-2 mb-2">
                <div class="w-8 h-8 rounded-full flex items-center justify-center mr-3"
                    style="background-color: #00E676;">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-medium text-white">Administrador</p>
                    <p class="text-xs text-gray-400">admin@nuvo.com</p>
                </div>
            </div>
            <button (click)="onLogout()"
                class="flex items-center w-full px-4 py-2 text-red-400 hover:bg-red-500/10 rounded-lg transition-all group">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span class="group-hover:translate-x-1 transition-transform">Cerrar Sesión</span>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto p-8" style="background-color: #0A0E1A;">
        <router-outlet></router-outlet>
    </main>

</div>
