<div class="min-h-screen flex items-center justify-center relative overflow-hidden" style="background-color: #0A0E1A;">

    <!-- Background Glow -->
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-green-500/5 rounded-full blur-[100px] pointer-events-none">
    </div>

    <!-- Top Left: Back Button -->
    <a routerLink="/"
        class="absolute top-6 left-6 flex items-center px-4 py-2 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-all text-sm font-medium border border-transparent hover:border-white/10">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
            </path>
        </svg>
        Volver al inicio
    </a>

    <!-- Top Right: Theme Toggle -->
    <button (click)="toggleTheme()"
        class="absolute top-6 right-6 p-2 rounded-full text-gray-400 hover:text-white hover:bg-white/5 transition-all">
        <div class="w-12 h-6 bg-gray-700 rounded-full relative flex items-center px-1">
            <div class="w-4 h-4 bg-white rounded-full shadow-md transform transition-transform duration-300"
                [class.translate-x-6]="!isDarkMode">
                <svg *ngIf="isDarkMode" class="w-3 h-3 text-gray-800 mx-auto mt-0.5" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                    </path>
                </svg>
            </div>
        </div>
    </button>

    <!-- Login Card -->
    <div class="w-full max-w-md p-8 rounded-3xl shadow-2xl relative z-10"
        style="background-color: #161B2E; border: 1px solid rgba(255,255,255,0.05);">

        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center shadow-lg shadow-green-500/20"
                style="background-color: #00E676;">
                <span class="text-black text-3xl font-bold">N</span>
            </div>
        </div>

        <!-- Title -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2 tracking-wide">NUVO ADMIN</h1>
            <p class="text-gray-400 text-sm">Inicia sesión en tu cuenta</p>
        </div>

        <!-- Form -->
        <form (ngSubmit)="onLogin()" class="space-y-5">

            <!-- Email -->
            <div>
                <label class="block text-gray-300 text-xs font-bold mb-2 uppercase tracking-wide">Correo
                    electrónico</label>
                <div class="relative group">
                    <span
                        class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 group-focus-within:text-green-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                            </path>
                        </svg>
                    </span>
                    <input type="email" [(ngModel)]="email" name="email" required
                        class="w-full pl-12 pr-4 py-3 rounded-xl focus:outline-none focus:border-green-500 transition-all text-white placeholder-gray-600"
                        style="background-color: #0A0E1A; border: 1px solid rgba(255,255,255,0.1);"
                        placeholder="admin@nuvo.com">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-300 text-xs font-bold mb-2 uppercase tracking-wide">Contraseña</label>
                <div class="relative group">
                    <span
                        class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 group-focus-within:text-green-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                            </path>
                        </svg>
                    </span>
                    <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" required
                        class="w-full pl-12 pr-12 py-3 rounded-xl focus:outline-none focus:border-green-500 transition-all text-white placeholder-gray-600"
                        style="background-color: #0A0E1A; border: 1px solid rgba(255,255,255,0.1);"
                        placeholder="••••••••">
                    <button type="button" (click)="togglePasswordVisibility()"
                        class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 hover:text-white transition-colors focus:outline-none">
                        <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                        <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Extras -->
            <div class="flex items-center justify-between text-sm pt-2">
                <label class="flex items-center text-gray-400 cursor-pointer hover:text-gray-300 transition-colors">
                    <input type="checkbox"
                        class="mr-2 rounded border-gray-600 text-green-500 focus:ring-green-500 bg-gray-800 w-4 h-4">
                    <span>Recordarme</span>
                </label>
                <a href="#" class="font-medium hover:text-green-400 transition-colors"
                    style="color: #00E676;">¿Olvidaste tu contraseña?</a>
            </div>

            <!-- Error -->
            <div *ngIf="errorMessage"
                class="p-3 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-sm text-center animate-pulse">
                {{ errorMessage }}
            </div>

            <!-- Submit Button -->
            <button type="submit" [disabled]="isLoading"
                class="w-full text-black font-bold py-3.5 rounded-xl transition-all duration-300 shadow-lg hover:shadow-green-500/20 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center hover:opacity-90 group mt-4"
                style="background-color: #00E676;">
                <span *ngIf="!isLoading" class="flex items-center">
                    Iniciar Sesión
                    <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </span>
                <span *ngIf="isLoading" class="flex items-center">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-black" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Procesando...
                </span>
            </button>
        </form>

        <!-- Test Credentials -->
        <div class="mt-8 p-4 rounded-xl border text-center"
            style="background-color: rgba(0, 230, 118, 0.05); border-color: rgba(0, 230, 118, 0.1);">
            <p class="text-xs text-gray-400 mb-2 font-medium uppercase tracking-wide">Usuario de prueba:</p>
            <div class="flex justify-center gap-2 flex-wrap">
                <span
                    class="px-2 py-1 rounded text-xs font-mono bg-green-500/10 text-green-500 border border-green-500/20">admin@nuvo.com</span>
                <span
                    class="px-2 py-1 rounded text-xs font-mono bg-green-500/10 text-green-500 border border-green-500/20">admin123</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-white/5 text-center">
            <p class="text-xs text-gray-500 mb-4">
                ¿No tienes una cuenta?
                <a href="#" class="hover:text-green-400 font-semibold transition-colors"
                    style="color: #00E676;">Contacta al administrador</a>
            </p>
            <p class="text-[10px] text-gray-600">© 2025 NUVO ADMIN. Todos los derechos reservados.</p>
        </div>

    </div>
</div>
